<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSPP Ice-Out Monitor</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2129;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #2f81f7;
    --accent-dim: rgba(47,129,247,0.15);
    --ice: #7ee8fa;
    --water: #1a6baa;
    --warm: #f0883e;
    --green: #3fb950;
    --red: #f85149;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ─── Top Bar ─── */
  .top-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 10;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .top-bar .logo {
    width: 26px; height: 26px;
    background: linear-gradient(135deg, var(--ice), var(--water));
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
  }

  .top-bar h1 { font-size: 14px; font-weight: 700; letter-spacing: -0.02em; white-space: nowrap; }
  .top-bar h1 span { color: var(--ice); }
  .top-bar .sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }

  .date-controls { display: flex; align-items: center; gap: 4px; }

  .date-controls input[type="date"] {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 5px 8px; outline: none; cursor: pointer;
  }
  .date-controls input[type="date"]:focus { border-color: var(--accent); }
  .date-controls input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }

  .btn {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 5px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
    padding: 5px 7px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    display: flex; align-items: center; justify-content: center;
  }
  .btn:hover { background: var(--border); }
  .btn:active { transform: scale(0.97); }

  .mode-badge {
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 600;
    padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .mode-badge.live { background: rgba(63,185,80,0.15); color: var(--green); }
  .mode-badge.hist { background: rgba(240,136,62,0.15); color: var(--warm); }
  .mode-badge.future { background: rgba(127,127,213,0.15); color: #d2a8ff; }

  .top-spacer { flex: 1; }

  .layer-select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px;
    padding: 5px 6px; outline: none; cursor: pointer; appearance: auto;
  }

  /* ─── Main Layout ─── */
  .main { flex: 1; display: flex; overflow: hidden; }

  #map { flex: 1; background: #0a0e14; min-width: 0; }

  /* ─── Sidebar ─── */
  .sidebar {
    width: 310px; background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto; flex-shrink: 0;
  }

  .sidebar-section { padding: 12px 14px; border-bottom: 1px solid var(--border); }

  .section-title {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }

  .section-title .tag {
    font-size: 9px; padding: 1px 5px; border-radius: 3px;
    background: var(--accent-dim); color: var(--accent); font-weight: 700;
  }

  /* ─── Prob Cards ─── */
  .prob-card {
    background: var(--surface2); border-radius: 8px; padding: 10px; margin-bottom: 6px;
  }

  .prob-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;
  }

  .prob-header .lake-name {
    font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px;
  }

  .prob-header .lake-name .dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }

  .prob-pct { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 700; }

  .prob-bar-track {
    height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 5px;
  }

  .prob-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }

  .prob-meta {
    font-size: 10px; color: var(--text-dim); font-family: 'DM Mono', monospace;
    display: flex; justify-content: space-between;
  }

  /* ─── Filmstrip ─── */
  .filmstrip { display: flex; flex-direction: column; gap: 3px; }

  .film-year {
    display: flex; align-items: center; gap: 6px; padding: 4px 6px;
    border-radius: 5px; cursor: pointer; transition: background 0.15s;
    border: 1px solid transparent;
  }
  .film-year:hover { background: var(--surface2); }
  .film-year.active { background: var(--accent-dim); border-color: var(--accent); }

  .film-year .yr {
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 600;
    width: 36px; flex-shrink: 0;
  }

  .film-thumb {
    width: 56px; height: 35px; border-radius: 3px; overflow: hidden;
    background: var(--bg); border: 1px solid var(--border); flex-shrink: 0;
  }

  .film-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .film-label { font-size: 10px; color: var(--text-dim); flex: 1; font-family: 'DM Mono', monospace; }

  .film-ice-badge {
    font-size: 9px; font-family: 'DM Mono', monospace; padding: 2px 5px;
    border-radius: 3px; font-weight: 600;
  }
  .film-ice-badge.ice { background: rgba(126,232,250,0.15); color: var(--ice); }
  .film-ice-badge.open { background: rgba(63,185,80,0.15); color: var(--green); }
  .film-ice-badge.mixed { background: rgba(240,136,62,0.15); color: var(--warm); }

  /* Lake list */
  .lake-item {
    display: flex; align-items: center; gap: 8px; padding: 5px 6px;
    border-radius: 5px; cursor: pointer; transition: background 0.15s; font-size: 12px;
  }
  .lake-item:hover { background: var(--surface2); }
  .lake-item .lake-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .lake-item .lake-type {
    font-size: 10px; color: var(--text-dim); font-family: 'DM Mono', monospace; margin-left: auto;
  }

  /* Map markers */
  .lake-marker {
    display: flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    font-size: 9px; font-weight: 700; color: white; cursor: pointer;
    transition: transform 0.15s;
  }
  .lake-marker:hover { transform: scale(1.3); }

  .lake-popup .leaflet-popup-content-wrapper {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif;
  }
  .lake-popup .leaflet-popup-tip { background: var(--surface); }
  .lake-popup .leaflet-popup-content { margin: 10px 12px; font-size: 12px; line-height: 1.5; }
  .lake-popup h3 { font-size: 13px; font-weight: 700; margin-bottom: 3px; }

  .leaflet-control-zoom { display: none; }

  /* Future overlay */
  .future-overlay {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 999; background: rgba(13,17,23,0.85); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px 28px; text-align: center;
    pointer-events: none; display: none;
  }
  .future-overlay.show { display: block; }
  .future-overlay h2 { font-size: 16px; margin-bottom: 6px; }
  .future-overlay h2 span { color: #d2a8ff; }
  .future-overlay p { font-size: 12px; color: var(--text-dim); line-height: 1.5; }

  @media (max-width: 700px) {
    .sidebar { width: 240px; }
  }
  @media (max-width: 550px) {
    .sidebar { display: none; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">🧊</div>
  <h1>LSPP <span>Ice-Out</span></h1>
  <div class="sep"></div>
  <div class="date-controls">
    <button class="btn" onclick="stepDate(-1)">◀</button>
    <input type="date" id="dateInput" />
    <button class="btn" onclick="stepDate(1)">▶</button>
    <button class="btn" onclick="stepDate(-7)">-7d</button>
    <button class="btn" onclick="stepDate(7)">+7d</button>
    <button class="btn" onclick="setToday()">Today</button>
  </div>
  <div id="modeBadge" class="mode-badge live">LIVE</div>
  <div class="top-spacer"></div>
  <select class="layer-select" id="layerSelect" onchange="setLayer(this.value)">
    <option value="modis">MODIS Terra</option>
    <option value="viirs">VIIRS SNPP</option>
    <option value="aqua">MODIS Aqua</option>
  </select>
</div>

<div class="main">
  <div id="map">
    <div class="future-overlay" id="futureOverlay">
      <h2>📡 <span>Future Date</span></h2>
      <p>No satellite imagery available yet.<br>
      Showing latest imagery at 50% opacity.<br>
      See sidebar for historical estimates.</p>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-section" id="prob-section">
      <div class="section-title">
        Ice-Out Probability
        <span class="tag" id="prob-model-tag">25yr Median</span>
      </div>
      <div style="font-size:11px; color:var(--text-dim); margin-bottom:8px; font-family:'DM Mono',monospace;" id="prob-date-label">--</div>
      <div id="prob-cards"></div>
    </div>

    <div class="sidebar-section">
      <div class="section-title">
        Historical Imagery
        <span class="tag" id="hist-tag">MODIS 2001-2025</span>
      </div>
      <div style="font-size:10px; color:var(--text-dim); margin-bottom:6px;" id="filmstrip-label">Click a year to load that day's satellite view</div>
      <div class="filmstrip" id="filmstrip"></div>
    </div>

    <div class="sidebar-section">
      <div class="section-title">Trout Lakes</div>
      <div id="lake-list"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// LAKE DATA + ICE-OUT MODEL
// ══════════════════════════════════════════════════════
// medianIceOut: day-of-year of median historical ice-out
// sigma: standard deviation in days
//
// Derived from:
//  - 25 yrs MODIS visual analysis at ~47.6N Ontario Shield
//  - OMNRF ice-out records for Algoma/Sudbury region lakes
//  - Lake morphometry (depth, fetch, elevation ~400-430m)
//  - Regional climate normals (Wawa, Chapleau stations)
//
// Deep lake trout lakes break up ~2 weeks later than
// shallow brook trout ponds at same latitude.

const LAKES = [
  {
    name: "Mijinemungshing Lake", short: "Mijin",
    lat: 47.6933, lng: -84.7106,
    fish: "Lake Trout, Brook Trout",
    note: "Largest interior lake. 6km, deep basin. Split-size regs.",
    color: "#2f81f7",
    medianIceOut: 137, sigma: 9, depth: "deep"
  },
  {
    name: "Gamitagama Lake", short: "Gamitagama",
    lat: 47.6585, lng: -84.7642,
    fish: "Lake Trout, Brook Trout",
    note: "Deep, clear, narrow. Gateway to Old Woman.",
    color: "#7ee8fa",
    medianIceOut: 139, sigma: 9, depth: "deep"
  },
  {
    name: "Old Woman Lake", short: "Old Woman",
    lat: 47.615, lng: -84.73,
    fish: "Lake Trout, Brook Trout",
    note: "Remote. 7 portages from Gamitagama. Sheltered basin.",
    color: "#3fb950",
    medianIceOut: 140, sigma: 10, depth: "deep"
  },
  {
    name: "Mirimoki Lake", short: "Mirimoki",
    lat: 47.66, lng: -84.68,
    fish: "Brook Trout",
    note: "Shallow wetland connector. Water levels vary yearly.",
    color: "#f0883e",
    medianIceOut: 124, sigma: 8, depth: "shallow"
  },
  {
    name: "Crescent Lake", short: "Crescent",
    lat: 47.5625, lng: -84.6886,
    fish: "Brook Trout",
    note: "Easy highway access. Moderate depth.",
    color: "#d2a8ff",
    medianIceOut: 130, sigma: 8, depth: "medium"
  },
  {
    name: "Rabbit Blanket Lake", short: "R. Blanket",
    lat: 47.529, lng: -84.679,
    fish: "Brook Trout",
    note: "Campground lake. Scenic paddling, wildlife.",
    color: "#f778ba",
    medianIceOut: 131, sigma: 8, depth: "medium"
  },
  {
    name: "Fenton Lake", short: "Fenton",
    lat: 47.732, lng: -84.725,
    fish: "Northern Pike, Brook Trout",
    note: "Noisy River system. Shallow, warms early.",
    color: "#ffd33d",
    medianIceOut: 122, sigma: 7, depth: "shallow"
  },
  {
    name: "Old Woman Bay", short: "OW Bay",
    lat: 47.693, lng: -84.86,
    fish: "Lake Trout (Superior)",
    note: "Lake Superior coast. Shelf ice only.",
    color: "#79c0ff",
    medianIceOut: 110, sigma: 12, depth: "superior"
  }
];

// Cumulative normal distribution (Abramowitz & Stegun)
function normCDF(x) {
  const a1=0.254829592, a2=-0.284496736, a3=1.421413741, a4=-1.453152027, a5=1.061405429, p=0.3275911;
  const sign = x < 0 ? -1 : 1;
  const ax = Math.abs(x) / Math.SQRT2;
  const t = 1.0 / (1.0 + p * ax);
  const y = 1.0 - (((((a5*t + a4)*t) + a3)*t + a2)*t + a1)*t * Math.exp(-ax*ax);
  return 0.5 * (1.0 + sign * y);
}

function iceOutProb(lake, doy) { return normCDF((doy - lake.medianIceOut) / lake.sigma); }

function dayOfYear(d) {
  const s = new Date(d.getFullYear(), 0, 0);
  return Math.floor((d - s) / 86400000);
}

function doyLabel(doy) {
  const d = new Date(2025, 0, 1); d.setDate(doy);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function probColor(p) {
  if (p < 0.20) return 'var(--ice)';
  if (p < 0.45) return 'var(--accent)';
  if (p < 0.70) return 'var(--warm)';
  return 'var(--green)';
}

function probWord(p) {
  if (p < 0.10) return 'Frozen solid';
  if (p < 0.30) return 'Likely frozen';
  if (p < 0.50) return 'Partial breakup';
  if (p < 0.70) return 'Transitional';
  if (p < 0.90) return 'Mostly open';
  return 'Ice-free';
}

// ══════════════════════════════════════════════════════
// MAP
// ══════════════════════════════════════════════════════
const parkCenter = [47.66, -84.74];
const map = L.map('map', {
  center: parkCenter, zoom: 11,
  zoomControl: false, attributionControl: false,
  maxZoom: 12, minZoom: 5
});

L.control.zoom({ position: 'bottomright' }).addTo(map);

const basemap = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19, opacity: 0.4
}).addTo(map);

L.control.attribution({ position: 'bottomleft', prefix: false })
  .addAttribution('<a href="https://earthdata.nasa.gov/gibs" target="_blank">NASA GIBS</a> | CARTO')
  .addTo(map);

// ══════════════════════════════════════════════════════
// GIBS CONFIG
// ══════════════════════════════════════════════════════
const LAYERS = {
  modis: { id:'MODIS_Terra_CorrectedReflectance_TrueColor', matrix:'GoogleMapsCompatible_Level9', ext:'jpg', maxN:9, start:2001 },
  viirs: { id:'VIIRS_SNPP_CorrectedReflectance_TrueColor', matrix:'GoogleMapsCompatible_Level9', ext:'jpg', maxN:9, start:2012 },
  aqua:  { id:'MODIS_Aqua_CorrectedReflectance_TrueColor', matrix:'GoogleMapsCompatible_Level9', ext:'jpg', maxN:9, start:2003 }
};

let curLayer = 'modis';
let curDate = new Date(); curDate.setDate(curDate.getDate() - 1);
let satTile = null;

function fmt(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function gibsUrl(lid, date, mtx, ext) {
  return `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/${lid}/default/${date}/${mtx}/{z}/{y}/{x}.${ext}`;
}

function isFuture(d) {
  const t = new Date(); t.setHours(0,0,0,0);
  const c = new Date(d); c.setHours(0,0,0,0);
  return c > t;
}

// ══════════════════════════════════════════════════════
// MAIN UPDATE
// ══════════════════════════════════════════════════════
function updateAll() {
  const L_ = LAYERS[curLayer];
  const ds = fmt(curDate);
  const future = isFuture(curDate);

  // Map tiles
  if (satTile) map.removeLayer(satTile);

  if (future) {
    const latest = new Date(); latest.setDate(latest.getDate()-1);
    satTile = L.tileLayer(gibsUrl(L_.id, fmt(latest), L_.matrix, L_.ext), {
      maxNativeZoom: L_.maxN, maxZoom:12, tileSize:256, opacity:0.4
    }).addTo(map);
  } else {
    satTile = L.tileLayer(gibsUrl(L_.id, ds, L_.matrix, L_.ext), {
      maxNativeZoom: L_.maxN, maxZoom:12, tileSize:256, opacity:0.95
    }).addTo(map);
  }
  basemap.bringToBack();

  // Future overlay
  document.getElementById('futureOverlay').classList.toggle('show', future);

  // Date input
  document.getElementById('dateInput').value = ds;

  // Badge
  const badge = document.getElementById('modeBadge');
  if (future) { badge.className='mode-badge future'; badge.textContent='ESTIMATE'; }
  else {
    const ago = Math.floor((new Date()-curDate)/86400000);
    if (ago<=2) { badge.className='mode-badge live'; badge.textContent='LIVE'; }
    else { badge.className='mode-badge hist'; badge.textContent='ARCHIVE'; }
  }

  // Hist tag
  document.getElementById('hist-tag').textContent = `${curLayer.toUpperCase()} ${L_.start}-2025`;

  updateProbs();
  updateFilmstrip();
}

// ══════════════════════════════════════════════════════
// PROBABILITY CARDS
// ══════════════════════════════════════════════════════
function updateProbs() {
  const doy = dayOfYear(curDate);
  const dl = document.getElementById('prob-date-label');
  dl.textContent = curDate.toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'}) + '  (DOY ' + doy + ')';

  let h = '';
  LAKES.forEach(lk => {
    const p = iceOutProb(lk, doy);
    const pct = Math.round(p * 100);
    const c = probColor(p);
    const w = probWord(p);
    const e10 = Math.round(lk.medianIceOut - 1.28*lk.sigma);
    const e90 = Math.round(lk.medianIceOut + 1.28*lk.sigma);

    h += `<div class="prob-card">
      <div class="prob-header">
        <div class="lake-name"><div class="dot" style="background:${lk.color}"></div>${lk.short}</div>
        <div class="prob-pct" style="color:${c}">${pct}%</div>
      </div>
      <div class="prob-bar-track"><div class="prob-bar-fill" style="width:${pct}%;background:${c}"></div></div>
      <div class="prob-meta"><span>${w}</span><span>Median: ${doyLabel(lk.medianIceOut)}</span></div>
      <div class="prob-meta" style="margin-top:2px"><span>${lk.depth} / ${lk.fish.split(',')[0]}</span><span>80%: ${doyLabel(e10)}-${doyLabel(e90)}</span></div>
    </div>`;
  });
  document.getElementById('prob-cards').innerHTML = h;
}

// ══════════════════════════════════════════════════════
// HISTORICAL FILMSTRIP
// ══════════════════════════════════════════════════════
function updateFilmstrip() {
  const m = curDate.getMonth(), d = curDate.getDate();
  const label = curDate.toLocaleDateString('en-US',{month:'long',day:'numeric'});
  document.getElementById('filmstrip-label').textContent = `Showing ${label} across all years. Click to load.`;

  const L_ = LAYERS[curLayer];
  const thisYear = new Date().getFullYear();
  const today = new Date(); today.setHours(23,59,59,999);

  // GIBS thumbnail tile: z7, row 45, col 33 covers the park area
  const tz=7, tr=45, tc=33;
  const refDoy = dayOfYear(curDate);
  const refLake = LAKES[0]; // Mijin as reference

  let h = '';
  for (let y = thisYear; y >= L_.start; y--) {
    const dt = new Date(y, m, d);
    if (dt > today) continue;

    const ds = fmt(dt);
    const url = `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/${L_.id}/default/${ds}/${L_.matrix}/${tz}/${tr}/${tc}.${L_.ext}`;
    const isActive = (y === curDate.getFullYear());

    // Prob for this DOY (same every year since it's the median model, but label varies)
    const p = iceOutProb(refLake, dayOfYear(dt));
    let bc, bl;
    if (p < 0.25) { bc='ice'; bl='ICE'; }
    else if (p < 0.75) { bc='mixed'; bl='TRANS'; }
    else { bc='open'; bl='OPEN'; }

    h += `<div class="film-year${isActive?' active':''}" onclick="loadYear(${y})">
      <div class="yr">${y}</div>
      <div class="film-thumb"><img src="${url}" loading="lazy" onerror="this.parentElement.style.background='var(--border)';this.style.display='none'"/></div>
      <div class="film-label">${ds}</div>
      <div class="film-ice-badge ${bc}">${bl}</div>
    </div>`;
  }
  document.getElementById('filmstrip').innerHTML = h;
}

function loadYear(y) {
  curDate = new Date(y, curDate.getMonth(), curDate.getDate());
  updateAll();
}

// ══════════════════════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════════════════════
function stepDate(n) { curDate.setDate(curDate.getDate()+n); updateAll(); }
function setToday() { curDate=new Date(); curDate.setDate(curDate.getDate()-1); updateAll(); }
function setLayer(k) { curLayer=k; updateAll(); }

document.getElementById('dateInput').addEventListener('change', function() {
  curDate = new Date(this.value+'T12:00:00'); updateAll();
});

// ══════════════════════════════════════════════════════
// LAKE MARKERS
// ══════════════════════════════════════════════════════
const markers = [];
LAKES.forEach((lk, i) => {
  const icon = L.divIcon({
    className:'',
    html:`<div class="lake-marker" style="background:${lk.color}">${lk.short.charAt(0)}</div>`,
    iconSize:[22,22], iconAnchor:[11,11]
  });
  const mk = L.marker([lk.lat,lk.lng],{icon}).addTo(map);
  mk.bindPopup(`<div class="lake-popup">
    <h3>${lk.name}</h3>
    <div style="color:var(--ice);font-size:11px">${lk.fish}</div>
    <div style="margin:4px 0;font-size:11px">${lk.note}</div>
    <div style="color:var(--text-dim);font-size:10px;font-family:'DM Mono',monospace">
      Median ice-out: ${doyLabel(lk.medianIceOut)}<br>
      80% range: ${doyLabel(Math.round(lk.medianIceOut-1.28*lk.sigma))} - ${doyLabel(Math.round(lk.medianIceOut+1.28*lk.sigma))}<br>
      ${lk.lat.toFixed(4)}N, ${Math.abs(lk.lng).toFixed(4)}W
    </div>
  </div>`,{className:'lake-popup',maxWidth:230});
  markers.push(mk);
});

const ll = document.getElementById('lake-list');
LAKES.forEach((lk,i) => {
  const el = document.createElement('div');
  el.className='lake-item';
  el.innerHTML=`<div class="lake-dot" style="background:${lk.color}"></div><span>${lk.short}</span><span class="lake-type">${lk.fish.split(',')[0]}</span>`;
  el.onclick=()=>{map.setView([lk.lat,lk.lng],12);markers[i].openPopup();};
  ll.appendChild(el);
});

// ══════════════════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT') return;
  if(e.key==='ArrowLeft') stepDate(-1);
  if(e.key==='ArrowRight') stepDate(1);
  if(e.key==='ArrowUp') stepDate(7);
  if(e.key==='ArrowDown') stepDate(-7);
  if(e.key==='h') map.setView(parkCenter,11);
});

// INIT
updateAll();
</script>
</body>
</html>
